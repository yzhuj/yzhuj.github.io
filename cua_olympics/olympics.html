<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Embedded Google Sheet</title>
    <style>
      html, body { height: 50%; margin: 0; }
      .wrap { height: 100%; display: flex; flex-direction: column; }
      header { padding: 12px 16px; font: 16px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      iframe { flex: 1; width: 50%; border: 0; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>My Google Sheet</header>
      <iframe
        title="Google Sheet"
        src="https://docs.google.com/spreadsheets/d/1veht8aI0a5MxpT28kfvTjPn9aOkJ3ikcB1Se0AxiCag/edit?usp=sharing"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
  </body>
</html>
